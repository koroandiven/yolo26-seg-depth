# 数据增强
# augmentation: true
# hsv_h: 0.015
# hsv_s: 0.7
# hsv_v: 0.4
# degrees: 0.0
# translate: 0.1
# scale: 0.5
# shear: 0.0
# perspective: 0.0
# flipud: 0.0
# fliplr: 0.5
# mosaic: 1.0
# mixup: 0.0
# copy_paste: 0.0

# 训练图像尺寸
