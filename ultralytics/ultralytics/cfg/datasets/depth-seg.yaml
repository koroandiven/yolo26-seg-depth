# YOLO26 Depth + Segmentation Dataset Configuration
# 基于 NYU Depth V2 格式

# 数据集根目录
path: ./depth_seg_dataset

# 训练集图像路径
train: images/train

# 验证集图像路径
val: images/val

# 分割标注路径 (YOLO 格式 .txt)
mask: segments/train

# 深度图路径 (16-bit PNG, 毫米为单位)
depth: depths/train

# 分割类别数
nc: 80

# 深度通道数 (单通道深度图)
depth_nc: 1

# 深度图归一化参数
depth_max: 100.0  # 最大深度值 (米)

# 类别名称 (COCO)
